[runtime]
sampler = test
root = ${COSMOSIS_SRC_DIR}

[DEFAULT]
fatal_errors = T
CSL = ${COSMOSIS_STANDARD_LIBRARY}

[test]
save_dir = shear_tot_simple_output

[pipeline]
; Pipeline for testing shearTotSimple GPU module
; Requires: halo_model tables + sigmaCritInv
modules = consistency camb mstar mf_tinker halo_model sigmaCritInv shearTotSimple

values = ${Y3_CLUSTER_CPP_DIR}/cosmosis_tests/gpu/values_simple_gpu.ini
likelihoods =
extra_output =
quiet = F
debug = T
timing = T

; =============================================================================
; COSMOLOGY MODULES
; =============================================================================

[consistency]
file = %(CSL)s/utility/consistency/consistency_interface.py

[camb]
file = %(CSL)s/boltzmann/camb/camb_interface.py
mode = all
lmax = 2500
feedback = 0
zmin = 0.0
zmax = 1.0
nz = 50
kmin = 1e-4
kmax = 50.0
nk = 200
halofit_version = takahashi
nonlinear = both

[mstar]
file = %(CSL)s/boltzmann/sigma_cpp/sigma_cpp.py
matter_power = matter_power_nl
zmax = 1.0
zmin = 0.0
dz = 0.1
rmin = 0.01
rmax = 20.5
dr = 0.5

[mf_tinker]
file = %(CSL)s/mass_function/mf_tinker/tinker_mf_module.so
redshift_zero = 0
feedback = 0

; =============================================================================
; HALO MODEL (provides DSigma_nfw, DSigma_hh, bias tables)
; =============================================================================

[halo_model]
file = ${Y3_CLUSTER_CPP_DIR}/y3_buzzard/buildWpGammat.py
R_perp_min = 0.1
R_perp_max = 30.0
R_perp_bins = 50
Radii_min = 1.0
Radii_max = 35.0
Radii_bins = 50
M_min = 1e12
M_max = 1e16
M_bins = 50

; =============================================================================
; SIGMA CRITICAL INVERSE
; =============================================================================

[sigmaCritInv]
file = ${Y3_CLUSTER_CPP_DIR}/y3_buzzard/buildSigmaCritInv.py
is_delta_sigma = False

; =============================================================================
; GPU SHEAR MODULE
; =============================================================================

[shearTotSimple]
file = ${Y3_CLUSTER_CPP_DIR}/release-build/src/modules/simple_gpu/shearTotSimple.so

; Integration bounds for (lo, zt, lnM)
lo_low = 10.0
lo_high = 200.0
zt_low = 0.1
zt_high = 0.8
lnm_low = 31.0
lnm_high = 36.0

; Grid points: (zo_low, zo_high, radii) - wall-of-numbers
; 3 redshift bins x 3 radii = 9 points
zo_low = 0.2 0.2 0.2 0.35 0.35 0.35 0.5 0.5 0.5
zo_high = 0.35 0.35 0.35 0.5 0.5 0.5 0.65 0.65 0.65
radii = 0.5 1.0 2.0 0.5 1.0 2.0 0.5 1.0 2.0

; Integration settings
eps_rel = 1e-3
eps_abs = 1e-10
max_eval = 1.0e6
algorithm = pagani
use_cartesian_product = true
