[runtime]
; The test sampler just runs a single parameter set
sampler = test
root = ${PWD}

[test]
; These are the parameters for this sampler.
; In this case there is just one parameter
save_dir = OUTPUT

; If something goes wrong this will aid diagnosis
fatal_errors=T

; The pipeline section contains information
; that describes the sequence of calculations
; to be done and what we want out at the end
[pipeline]
; The list of modules to be run, in this order.
; The modules named here must appear as sections below
modules = consistency camb gammat #test
; The file to get cosmological and nuisance parameters
; from.
values = ${Y3_CLUSTER_CPP_DIR}/cosmosis_tests/gammat_test_values.ini
; Not used here, becuase we are not sampling
likelihoods = 
extra_output = 
quiet=F
debug=T
timing=T

; The consistency module translates between our chosen parameterization
; and any other that modules in the pipeline may want (e.g. camb)
; The consistency module translates between our chosen parameterization
; and any other that modules in the pipeline may want (e.g. camb)
[consistency]
file = ${COSMOSIS_STANDARD_LIBRARY}/utility/consistency/consistency_interface.py

[camb]
file = ${COSMOSIS_STANDARD_LIBRARY}/boltzmann/camb/camb_interface.py
halofit_version = takahashi
feedback=0
kmax = 50.0
kmin = 5e-3
lmax = 2500
mode=all
power_spectra=delta_tot delta_nonu
nk = 128
nonlinear = both
nz = 50
; zmax must be higher than the highest integration range
zmax = 1.0
; If the infinities in the distance outputs disturb you, use the following
; zmin = 0.0001
; If you are using sigma8_rescale, though, zmin must = 0.
zmin = 0.0

[gammat]
file = ${Y3_CLUSTER_CPP_DIR}/y3_buzzard/buildWpGammat.py
; Radii of Sigma_1,2,  in Mpc/h comoving
R_perp_min = 0.05
R_perp_max = 6.
R_perp_bins = 256
; Radii of Wp_hh/nfw, in Mpc/h comoving
Radii_min = 1.0
Radii_max = 35.
Radii_bins = 128
; cluster mass, in Msun/h
M_min = 1e12
M_max = 1e16
M_bins = 100
; cluster photo-z error
; for now is simply the peculiar velocity
sigma_photoz = 0.01 

[test]
file = ${Y3_CLUSTER_CPP_DIR}/cosmosis_tests/gammat_test.py
