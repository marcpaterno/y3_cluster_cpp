; Parameters and data in CosmoSIS are organized into sections
; so we can easily see what they mean.
; There is only one section in this case, called cosmological_parameters
; omega_m and sigma8_input are from DES Y1 data
[cosmological_parameters]
omega_m  =  0.264
h0  =  0.7  
omega_b = 0.047
tau = 0.08
n_s = 0.96
A_s = 2.1565e-09
sigma8_input = 0.807 
omega_k = 0.0
w = -1.0
wa = 0.0

[cluster_abundance]
hmf_s = 4.50732047e-02
hmf_q = 1.01958078e+00

[cluster_sz]
;; We are offseting the initial parameters slightly from the true values, in
;; order to really test the maximum likelihood estimator
A_P_0 = 15 17.0 25
am_P_0 = 0.0 0.13 0.3
az_P_0 = -1.5 -0.5 0.0
A_x_c = 0.2 0.7 0.9
am_x_c = -0.3 0.1 0.3
az_x_c = -0.5 0.5 2.0
A_beta = 4.0 4.1 5.0
am_beta = -0.5 -0.1 0.5
az_beta = 0.1 0.3 1.0
