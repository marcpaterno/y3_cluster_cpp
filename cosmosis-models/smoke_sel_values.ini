; Values ini for the smoke_sel_{camb,cp_camb}.ini pipelines.
; Identical to smoke_emu_values.ini plus a [photoz] block needed by the
; average_sigma_crit_inv module (src/modules/average_sigma_crit_inv/).

; widePlanck cosmology — Planck 2018 base-LCDM (TT,TE,EE+lowE+lensing).
; Replaces the prior log1e10As=3.97 setting (sigma_8 ~ 1.14 at this Omega_m,
; ~40% above Planck).  Inside both the v2c [2.904, 3.184] and v3c
; [2.45, 3.65] cp_camb emulator trained boxes.
[cosmological_parameters]
h0        = 0.6766
omega_m   = 0.311049
omega_b   = 0.048975
omega_k   = 0.0
tau       = 0.0544
n_s       = 0.9665
log1e10As = 3.0448
w         = -1.0
wa        = 0.0
mnu       = 0.0
num_massive_neutrinos = 0
nnu       = 3.046
neutrino_hierarchy    = 0
; mnu=0 mandatory for cp_camb apples-to-apples: cp_camb uses
; scale-independent D(z), CAMB's delta_cb growth becomes scale-dependent
; with massive neutrinos (see docs/emulator_validation.tex Sec.~1).
; -> sigma_8 ~ 0.811

; HMF_t reads these; s=0, q=1 collapses the multiplier to 1.
[cluster_abundance]
hmf_s = 0.0
hmf_q = 1.0

[cluster_mor]
log10_Mmin   = 11.4
log10_M1     = 12.7
alpha        = 0.86
epsilon      = 0.0
sigma_lambda = 0.18

; Used by average_sigma_crit_inv.py. delta_z shifts the source-bin p(z).
[photoz]
delta_z = 0.0
