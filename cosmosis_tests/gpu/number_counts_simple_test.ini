[runtime]
sampler = test
root = ${COSMOSIS_SRC_DIR}

[DEFAULT]
fatal_errors = T
CSL = ${COSMOSIS_STANDARD_LIBRARY}

[test]
save_dir = number_counts_simple_output

[pipeline]
; Minimal test for numberCountsSimple GPU module
; Does NOT include haloModel (needed for sigma/shear modules)
modules = consistency camb mf_tinker numberCountsSimple

values = ${Y3_CLUSTER_CPP_DIR}/cosmosis_tests/gpu/values_simple_gpu.ini
likelihoods =
extra_output =
quiet = F
debug = T
timing = T

; =============================================================================
; COSMOLOGY MODULES
; =============================================================================

[consistency]
file = %(CSL)s/utility/consistency/consistency_interface.py

[camb]
file = %(CSL)s/boltzmann/camb/camb_interface.py
mode = all
lmax = 2500
feedback = 0
zmin = 0.0
zmax = 1.0
nz = 100
kmin = 1e-4
kmax = 50.0
nk = 500
halofit_version = takahashi
nonlinear = pk

[mf_tinker]
file = %(CSL)s/mass_function/mf_tinker/tinker_mf_module.so
redshift_zero = 0
feedback = 0

; =============================================================================
; GPU NUMBER COUNTS MODULE
; =============================================================================

[numberCountsSimple]
file = ${Y3_CLUSTER_CPP_DIR}/release-build/src/modules/simple_gpu/numberCountsSimple.so

; Integration bounds for (lo, zt, lnM)
lo_low = 10.0
lo_high = 200.0
zt_low = 0.1
zt_high = 0.8
lnm_low = 31.0
lnm_high = 36.0

; Grid points: redshift bin edges (wall-of-numbers)
zo_low = 0.2 0.35 0.5
zo_high = 0.35 0.5 0.65

; Integration settings
eps_rel = 1e-3
eps_abs = 1e-10
max_eval = 1.0e6
algorithm = pagani
use_cartesian_product = true
