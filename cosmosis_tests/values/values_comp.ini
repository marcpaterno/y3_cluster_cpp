; widePlanck cosmology — Planck 2018 base-LCDM (TT,TE,EE+lowE+lensing).
; Replaces the historical cosmology that used log1e10As=3.9046 (sigma_8
; ~ 1.18, ~50% above Planck).  Inside both the v2c [2.904, 3.184] and
; v3c [2.45, 3.65] cp_camb emulator trained boxes, so this point can be
; driven by either emulator AND by the full CosmoSIS CAMB module.
[cosmological_parameters]
h0       = 0.6766
omega_m  = 0.1 0.311049 0.5
omega_b  = 0.048975
omega_k  = 0.0
tau      = 0.0544
n_s      = 0.9665
log1e10As = 3.0448
w        = -1.0
wa       = 0.0
mnu      = 0.06
; consistency derives omega_nu from mnu (= 0.06 eV / 93.14 / h0**2 ~ 0.001407)
; -> sigma_8 ~ 0.811

[cluster_abundance]
fcen = 1.0
# MOR
mor_A = 137252859112.81984
mor_B = 2645961929488.942
mor_alpha = 6.91589257e-01
mor_sigma = 1.29339555e-01
# LO_LC
lo_lc_alpha = 1.66
lo_lc_a = 0.26
lo_lc_b = 1.43
lo_lc_R_lambda = 1.0
# LC_LT
lc_lt_tau = 1.0
lc_lt_mu = 1.0
lc_lt_sigma = 1.0
lc_lt_fmsk = 1.0
lc_lt_fprj = 1.0
# ZO_ZT
zo_zt_sigma = 0.005
# PZSOURCE
pzsource_zbin = 0.4
pzsource_sigma = 0.2
# ROFFSET
roffset_tau = 0.2
# HMF
hmf_s = 4.50732047e-02
hmf_q = 1.01958078e+00
# Integration ranges:
lnM_min = 29.0
lnM_max = 38.0
lt_min = 2.0
lt_max = 140.0
lc_min = 2.0
lc_max = 140.0
zo_min = 0.05 
;zo_min this one should not be necessary
zo_max = 0.35
;zo_max this one should not be necessary
zt_min = 0.05
zt_max = 0.35
R_min = 0.0
R_max = 3.0
A_min = -0.01
A_max = 0.01
theta_min = 0.0
theta_max = 6.28318530718

