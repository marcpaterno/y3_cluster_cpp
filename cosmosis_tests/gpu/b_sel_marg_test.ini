[runtime]
sampler = test
root = ${COSMOSIS_SRC_DIR}

[DEFAULT]
fatal_errors = T
CSL = ${COSMOSIS_STANDARD_LIBRARY}

[test]
save_dir = b_sel_marg_output

[pipeline]
; Pipeline for testing bSelMargGPU module (P1, I1, J in one pass)
; Requires: halo_model (for bias), xi_nl tables
; Note: halo_model_cosmosis.py creates both haloModel and xi_nl sections
modules = consistency growth camb mstar mf_tinker halo_model bSelMargGPU

values = ${Y3_CLUSTER_CPP_DIR}/cosmosis_tests/gpu/values_simple_gpu.ini
likelihoods =
extra_output =
quiet = F
debug = T
timing = T

; =============================================================================
; COSMOLOGY MODULES
; =============================================================================

[consistency]
file = %(CSL)s/utility/consistency/consistency_interface.py

[camb]
file = %(CSL)s/boltzmann/camb/camb_interface.py
mode = all
lmax = 2500
feedback = 0
zmin = 0.0
zmax = 1.0
nz = 50
kmin = 1e-4
kmax = 50.0
nk = 200
halofit_version = takahashi
nonlinear = both

[mstar]
file = %(CSL)s/boltzmann/sigma_cpp/sigma_cpp.py
matter_power = matter_power_nl
zmax = 1.0
zmin = 0.0
dz = 0.1
rmin = 0.01
rmax = 20.5
dr = 0.5

[mf_tinker]
file = %(CSL)s/mass_function/mf_tinker/tinker_mf_module.so
redshift_zero = 0
feedback = 0

; =============================================================================
; GROWTH FACTOR (needed by halo_model_cosmosis.py for bias(M,z))
; =============================================================================

[growth]
file = %(CSL)s/structure/growth_factor/growth_module.so
zmin = 0.0
zmax = 1.0
dz = 0.01

; =============================================================================
; HALO MODEL (provides bias tables + xi_nl)
; Using halo_model_cosmosis.py which creates both haloModel and xi_nl sections
; =============================================================================

[halo_model]
file = ${Y3_CLUSTER_CPP_DIR}/y3_buzzard/halo_model_cosmosis.py
R_perp_min = 0.1
R_perp_max = 30.0
R_perp_bins = 50
Radii_min = 1.0
Radii_max = 35.0
Radii_bins = 50
M_min = 1e12
M_max = 1e16
M_bins = 50
; Skip lensing tables (not needed for b_sel_marg)
compute_lensing_1h = F
compute_lensing_2h = F

; =============================================================================
; GPU B_SEL_MARG MODULE (unified P1, I1, J)
; =============================================================================

[bSelMargGPU]
file = ${Y3_CLUSTER_CPP_DIR}/release-build/src/modules/simple_gpu/bSelMargGPU.so

; Integration bounds for 3D: (lt, zt, lnM)
; Inner theta integral uses fixed 10-point GL quadrature
lt_low = 1.0
lt_high = 200.0
zt_low = 0.1
zt_high = 0.8
lnm_low = 31.0
lnm_high = 36.0

; Grid points: (zo_low, zo_high, lambda_bin)
; Test with 1 richness bin (bin 0 = [20,30]) x 3 redshift bins
zo_low = 0.20 0.35 0.50
zo_high = 0.35 0.50 0.65
lambda_bin = 0 0 0

; Integration settings
eps_rel = 1e-2
eps_abs = 1e-10
max_eval = 5.0e6
algorithm = pagani
