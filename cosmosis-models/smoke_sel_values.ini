; Values ini for the smoke_sel_{camb,cp_camb}.ini pipelines.
; Identical to smoke_emu_values.ini plus a [photoz] block needed by the
; average_sigma_crit_inv module (src/modules/average_sigma_crit_inv/).

[cosmological_parameters]
h0 = 0.6726
omega_m = 0.267
omega_b = 0.045
omega_k = 0.0
tau = 0.08
log1e10As = 3.97
; cp_camb emulator caps log1e10As at 3.184, so the P(k) it delivers at
; log1e10As=3.97 realises sigma8(z=0) ~ 0.800 regardless of this knob.
sigma8_input = 0.80
n_s = 0.963
w = -1.0
wa = 0.0
mnu = 0.0
num_massive_neutrinos = 3
nnu = 3.046
neutrino_hierarchy = 1

; HMF_t reads these; s=0, q=1 collapses the multiplier to 1.
[cluster_abundance]
hmf_s = 0.0
hmf_q = 1.0

[cluster_mor]
log10_Mmin   = 11.4
log10_M1     = 12.7
alpha        = 0.86
epsilon      = 0.0
sigma_lambda = 0.18

; Used by average_sigma_crit_inv.py. delta_z shifts the source-bin p(z).
[photoz]
delta_z = 0.0
