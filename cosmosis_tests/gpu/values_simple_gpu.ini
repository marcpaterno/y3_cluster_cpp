[cosmological_parameters]
; Cosmological parameters for simple_gpu test
h0 = 0.7
omega_m = 0.286
omega_b = 0.047
omega_k = 0.0

; Neutrinos
nnu = 3.046
omega_nu = 0.0

; Inflation
n_s = 0.96
log1e10As = 3.092918

; Reionization
tau = 0.08

; Dark energy
w = -1.0
wa = 0.0

[cluster_abundance]
; Mass-observable relation (Costanzi MOR)
; P(lambda | M, z) - skewed lognormal distribution
; Parameters following mor_des_log_t.cuh conventions:
; - mor_logMmin: log10(M_min) - minimum halo mass to host central galaxy
; - mor_logRatio: log10(M1/M_min) - ratio of characteristic mass to min mass
; - mor_alpha: slope of mass-richness relation
; - mor_sigma: intrinsic scatter
; - mor_epsilon: redshift evolution power
; - z_mor_pivot: pivot redshift
mor_logMmin = 11.3852818
mor_logRatio = 1.3111592
mor_alpha = 0.858693714
mor_sigma = 0.180949022
mor_epsilon = 0.0
z_mor_pivot = 0.4544

; HMF scaling parameters
hmf_s = 0.00
hmf_q = 1.00

; Centering fraction (for miscentering - not used in simple modules)
fcen = 1.0
roffset_tau = 0.17

[cluster_mor]
; MOR parameters in the format expected by bsel.py
; These are derived from cluster_abundance parameters above
log10_Mmin = 11.3852818
log10_M1 = 12.696441
alpha = 0.858693714
epsilon = 0.0
sigma_lambda = 0.180949022

[photoz]
; Photo-z uncertainty for K(zo|z) kernel
; Note: sigma_z is a single value; z-dependent values are handled in the module
sigma_z = 0.01

; Photo-z bias (systematic shift in redshift estimate)
; delta_z = 0 means no systematic bias: z_obs = z_true + scatter
; Non-zero values shift the photo-z distribution: z_obs = z_true + delta_z + scatter
; Used by average_sigma_crit_inv to compute lensing efficiency
delta_z = 0.0
