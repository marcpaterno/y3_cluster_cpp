[runtime]
; The test sampler just runs a single parameter set
sampler = test
root = ${COSMOSIS_SRC_DIR}

[test]
; These are the parameters for this sampler.
; In this case there is just one parameter
save_dir = OUTPUT

; If something goes wrong this will aid diagnosis
fatal_errors=T

; The pipeline section contains information
; that describes the sequence of calculations
; to be done and what we want out at the end
[pipeline]
; The list of modules to be run, in this order.
; The modules named here must appear as sections below
#MISS all the CUDA modules between deltasigma and. finish
modules = consistency camb deltasigma finish parabola
; The file to get cosmological and nuisance parameters
; from.
values = ${Y3_CLUSTER_CPP_DIR}/src/modules/deltasigma/parabola_values.ini
; Not used here, becuase we are not sampling
;likelihoods = 
;extra_output = 
quiet=F
debug=T
timing=T


; The consistency module translates between our chosen parameterization
; and any other that modules in the pipeline may want (e.g. camb)
[consistency]
file = ${COSMOSIS_STANDARD_LIBRARY}/utility/consistency/consistency_interface.py

; A module!  Camb, set to a mode where it does
; background evolution, CMB, and matter power
[camb]
#file = ${COSMOSIS_STANDARD_LIBRARY}/boltzmann/isitgr/camb.so
file = ${COSMOSIS_STANDARD_LIBRARY}/boltzmann/camb/camb_interface.py
feedback=0
halofit_version = takahashi
kmax = 50.0
kmin = 1e-4
lmax=2500
mode=all
power_spectra=delta_tot delta_nonu
nk = 182
nonlinear = both
nz = 100
; zmax must be higher than the highest integration range
zmax = 1.0
zmin = 0.0

#mode=all
#zmin=0.1
#zmax=0.3
#nz=100
#lmax=2600          ;max ell to use for cmb calculation
#feedback=2         ;amount of output to print




[deltasigma]
#file = ${Y3_CLUSTER_CPP_DIR}/deltasigma/deltasigma.py
file = ${Y3_CLUSTER_CPP_DIR}/src/modules/deltasigma/deltasigma.py
; distance in the sky, in Mpc/h
R_perp_min = 0.01 
R_perp_max = 250
R_perp_bins = 1000

; Radii of xi_hm, in Mpc/h
Radii_min = 0.01
Radii_max = 1000
Radii_bins = 1000

; cluster mass, in Msun/h
M_min = 1E12
M_max = 1E16
M_bins = 100


[finish]
file = ${Y3_CLUSTER_CPP_DIR}/src/modules/finish/finish.py



[parabola]
file = ${Y3_CLUSTER_CPP_DIR}/src/modules/parabola/parabola.py
; distance in the sky, in Mpc/h
R_perp_min = 0.01 
R_perp_max = 250
R_perp_bins = 1000

; Radii of xi_hm, in Mpc/h
Radii_min = 0.01
Radii_max = 1000
Radii_bins = 1000

; cluster mass, in Msun/h
M_min = 1E12
M_max = 1E16
M_bins = 100
