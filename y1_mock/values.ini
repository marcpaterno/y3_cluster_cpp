; mor_logRatio = 1.0 1.22 1.478
mor_logRatio = 1.22
mor_alpha = 0.75
mor_sigma = 0.2
mor_epsilon = 0.0
z_mor_pivot = 0.35
# LO_LC
lo_lc_alpha = 1.66
lo_lc_a = 0.26
lo_lc_b = 1.43
lo_lc_R_lambda = 1.0
# LC_LT
lc_lt_tau = 1.0
lc_lt_mu = 1.0
lc_lt_sigma = 1.0
lc_lt_fmsk = 1.0
lc_lt_fprj = 1.0
# ZO_ZT
zo_zt_sigma = 0.005
# ROFFSET
roffset_tau = 0.2
# HMF
; hmf_s = 0.02 0.058814 0.1
; hmf_q = 0.9 1.04680 1.2
; hmf_s = 0.037
; hmf_q = 1.008
hmf_s = 0.0
hmf_q = 1.0
; sigma_output = 0.81

[boost_factor_params]
# Boost factor parameters - fitted from DES Y1 data (McClintock et al. 2019)
# 4 richness bins (l=0-3) x 3 redshift bins (z=0-2) = 12 bins
# Parameters: logrs (log10 scale radius in Mpc/h), logb0 (log10 amplitude)
# Format: param = min start max
# Bins with weak signal (l0_z0, l0_z1, l3_z2) use fixed small values

# Lambda bin 0 (20 < lambda < 30) - weak boost signal
logrs_l0_z0 = -1.0    ; weak signal - fixed
logb0_l0_z0 = -2.0    ; weak signal - fixed
logrs_l0_z1 = -1.0    ; weak signal - fixed
logb0_l0_z1 = -2.0    ; weak signal - fixed
logrs_l0_z2 = -1.24 -0.74 -0.24   ; rs = 0.18 Mpc/h
logb0_l0_z2 = -1.52 -1.02 -0.52   ; b0 = 0.096

# Lambda bin 1 (30 < lambda < 45)
logrs_l1_z0 = -0.66 -0.16 0.34    ; rs = 0.69 Mpc/h
logb0_l1_z0 = -1.36 -0.86 -0.36   ; b0 = 0.14
logrs_l1_z1 = -0.73 -0.23 0.27    ; rs = 0.59 Mpc/h
logb0_l1_z1 = -1.76 -1.26 -0.76   ; b0 = 0.056
logrs_l1_z2 = -1.28 -0.78 -0.28   ; rs = 0.17 Mpc/h
logb0_l1_z2 = -1.29 -0.79 -0.29   ; b0 = 0.16

# Lambda bin 2 (45 < lambda < 60)
logrs_l2_z0 = -0.74 -0.24 0.26    ; rs = 0.58 Mpc/h
logb0_l2_z0 = -1.23 -0.73 -0.23   ; b0 = 0.19
logrs_l2_z1 = -0.74 -0.24 0.26    ; rs = 0.57 Mpc/h
logb0_l2_z1 = -1.67 -1.17 -0.67   ; b0 = 0.068
logrs_l2_z2 = -0.89 -0.39 0.11    ; rs = 0.41 Mpc/h
logb0_l2_z2 = -1.64 -1.14 -0.64   ; b0 = 0.073

# Lambda bin 3 (60 < lambda < 250)
logrs_l3_z0 = -0.70 -0.20 0.30    ; rs = 0.64 Mpc/h
logb0_l3_z0 = -1.13 -0.63 -0.13   ; b0 = 0.23
logrs_l3_z1 = -0.43 0.07 0.57     ; rs = 1.17 Mpc/h
logb0_l3_z1 = -1.84 -1.34 -0.84   ; b0 = 0.046
logrs_l3_z2 = -1.0    ; weak signal - fixed
logb0_l3_z2 = -2.0    ; weak signal - fixed
