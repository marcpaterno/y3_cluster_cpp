[runtime]
sampler = test

[test]
save_dir = ./boost_test_output

[pipeline]
modules = mock_shear applyBoostFactor check_output
values = test_boost_values.ini
quiet = False
debug = True
timing = True

[mock_shear]
file = mock_shear_data.py
n_lambda_bins = 4
n_z_bins = 3
n_r_bins = 10
r_min = 0.3
r_max = 5.0

[applyBoostFactor]
file = applyBoostFactor.py
n_lambda_bins = 4
n_z_bins = 3
output_section = shear_boosted

[check_output]
file = check_boost_output.py
