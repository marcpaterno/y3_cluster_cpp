[runtime]
; use either the test or list sampler.
; sampler = zeus
sampler = test
root = ${COSMOSIS_SRC_DIR}

[test]
save_dir = output

[zeus]
save_dir = output
walkers = 30
samples = 3
nsteps = 5
;nsteps = 50

[DEFAULT]
; If something goes wrong this will aid diagnosis
fatal_errors =  true

[output]
filename = test.out
format = text
verbosity = debug

; The pipeline section contains information
; that describes the sequence of calculations
; to be done and what we want out at the end
[pipeline]
modules = consistency camb sigma8_rescale mf_tinker deltasigma 
; SigmaCentY1MortCUDAScalarIntegrand SigmaMiscentY1MortCUDAScalarIntegrand NCCentY1MortCUDAScalarIntegrand NCMiscentY1MortCUDAScalarIntegrand
values = ${Y3_CLUSTER_CPP_DIR}/y1_park/values_y1_park.ini
;
; We can not yet run this likelihood, because the predictions from our
; integrands have diffent shapes. We have to update the likelihood to
; understand that NC predictions do not have radius dependence.
;
; likelihoods = SigmaMort_Like
quiet=True
debug=True
timing=True

; The consistency module translates between our chosen parameterization
; and any other that modules in the pipeline may want (e.g. camb)
[consistency]
file = ${COSMOSIS_STANDARD_LIBRARY}/utility/consistency/consistency_interface.py

[camb]
file = ${COSMOSIS_STANDARD_LIBRARY}/boltzmann/camb/camb_interface.py
halofit_version = takahashi
feedback=0
kmax = 50.0
kmin = 1e-4
lmax=2500
mode=all
power_spectra=delta_tot delta_nonu
nk = 182
nonlinear = both
nz = 100
; zmax must be higher than the highest integration range
zmax = 1.0
; If the infinities in the distance outputs disturb you, use the following
; zmin = 0.0001
; If you are using sigma8_rescale, though, zmin must = 0.
zmin = 0.0

[mf_tinker]
file = ${COSMOSIS_STANDARD_LIBRARY}/mass_function/mf_tinker/tinker_mf_module.so
redshift_zero = 0
feedback=0
matter_power_lin_version = 2

[sigma8_rescale]
file = ${COSMOSIS_STANDARD_LIBRARY}/utility/sample_sigma8/sigma8_rescale.py

[deltasigma]
file = ${Y3_CLUSTER_CPP_DIR}/src/modules/deltasigma/deltasigma.py

; distance in the sky, in Mpc/h
R_perp_min = 0.01
R_perp_max = 250
R_perp_bins = 1000
; Radii of xi_hm, in Mpc/h
Radii_min = 0.01
Radii_max = 300
Radii_bins = 200
; cluster mass, in Msun/h
M_min = 1E12
M_max = 1E16
M_bins = 100

[SigmaCentY1MortCUDAScalarIntegrand]
