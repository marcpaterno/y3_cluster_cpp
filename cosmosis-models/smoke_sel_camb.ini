; ========================================================================
; Adaptive reference path: cubacpp::Cuhre (or Vegas) on the inner 2-D
; (z, lnM) integral, same outer-theta log-GL breakpoints as
; shear_prj.  Writes sigma_prj_cuhre / dsigma_prj_cuhre /
; shear_prj_cuhre with {vals, rnd, cl} subfields.  Used as a
; convergence reference against shear_prj; not enabled in the
; default modules list.
; ========================================================================
[shear_prj_cuhre]
file = ${Y3_CLUSTER_CPP_DIR}/release-build/src/modules/sigma_prj_cpu/ShearPrjCuhre.so
algorithm   = cuhre
eps_rel     = 1.0e-3
eps_abs     = 1.0e-20
max_eval    = 30000
zt_low      = 0.10
zt_high     = 0.75
lnm_low     = 29.9336
lnm_high    = 35.6814
R_max_cMpch = 30.0
n_lnm       = 24
