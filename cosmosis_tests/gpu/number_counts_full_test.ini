[runtime]
sampler = test
root = ${COSMOSIS_SRC_DIR}

[DEFAULT]
fatal_errors = T
CSL = ${COSMOSIS_STANDARD_LIBRARY}

[test]
save_dir = number_counts_full_output

[pipeline]
; Full 4D GPU integration pipeline for number counts.
; Integrates over (lob, ltr, zt, lnM) directly
modules = consistency camb mf_tinker prj_params numberCountsFull

values = ${Y3_CLUSTER_CPP_DIR}/cosmosis_tests/gpu/values_simple_gpu.ini
likelihoods =
extra_output =
quiet = F
debug = T
timing = T

; =============================================================================
; COSMOLOGY MODULES
; =============================================================================

[consistency]
file = %(CSL)s/utility/consistency/consistency_interface.py

[camb]
file = %(CSL)s/boltzmann/camb/camb_interface.py
mode = all
lmax = 2500
feedback = 0
zmin = 0.0
zmax = 1.0
nz = 100
kmin = 1e-4
kmax = 50.0
nk = 500
halofit_version = takahashi
nonlinear = pk

[mf_tinker]
file = %(CSL)s/mass_function/mf_tinker/tinker_mf_module.so
redshift_zero = 0
feedback = 0

; =============================================================================
; EMG COEFFICIENTS (Costanzi-2026 projection effects)
; =============================================================================

[prj_params]
file = ${Y3_CLUSTER_CPP_DIR}/y3_buzzard/prj_params.py
; Publishes EMG coefficients to datablock section 'plob_ltr_params'

; =============================================================================
; FULL 4D NUMBER COUNTS (GPU)
; =============================================================================

[numberCountsFull]
file = ${Y3_CLUSTER_CPP_DIR}/release-build/src/modules/simple_gpu/numberCountsFull.so

; Integration bounds for 4D volume: (lob, ltr, zt, lnM)
; lob (observed richness) bounds for integration
lob_int_low = 5.0
lob_int_high = 250.0

; ltr (true richness) bounds
ltr_low = 1.0
ltr_high = 300.0

; zt (true redshift) bounds
zt_low = 0.1
zt_high = 0.8

; lnM (log mass) bounds
lnm_low = 31.0
lnm_high = 36.0

; Grid points: define the richness and redshift bins
; Each bin is specified by (lob_low, lob_high, zo_low, zo_high)
;
; DES Y3 richness bins: [20,30], [30,45], [45,60], [60,200]
; DES Y3 redshift bins: [0.20,0.35], [0.35,0.50], [0.50,0.65]
;
; Full 12-bin configuration (4 richness x 3 redshift):
; Here we use a subset for testing
;
; Bin 0: lambda=[20,30], z=[0.20,0.35]
; Bin 1: lambda=[20,30], z=[0.35,0.50]
; Bin 2: lambda=[20,30], z=[0.50,0.65]
; Bin 3: lambda=[30,45], z=[0.20,0.35]
; ... etc

; For quick testing, use just 3 bins (one richness bin, three z bins)
lob_bin_low = 20.0 20.0 20.0
lob_bin_high = 30.0 30.0 30.0
zo_low = 0.20 0.35 0.50
zo_high = 0.35 0.50 0.65

; Integration settings
eps_rel = 1e-2
eps_abs = 1e-10
max_eval = 5.0e6
algorithm = pagani
use_cartesian_product = false
