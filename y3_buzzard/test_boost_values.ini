# Y1 Boost Factor Parameters (fitted from McClintock et al. 2019 data)
# Parameters: logrs (log10 scale radius in Mpc/h), logb0 (log10 amplitude)
# Bins with weak/no signal (l0_z0, l0_z1, l3_z2) use small values giving B(R)~1

[boost_factor_params]
# Lambda bin 0 (20 < lambda < 30)
logrs_l0_z0 = -1.0    ; weak signal - minimal boost
logb0_l0_z0 = -2.0    ; weak signal - minimal boost
logrs_l0_z1 = -1.0    ; weak signal - minimal boost
logb0_l0_z1 = -2.0    ; weak signal - minimal boost
logrs_l0_z2 = -0.742  ; rs = 0.18 Mpc/h
logb0_l0_z2 = -1.018  ; b0 = 0.096

# Lambda bin 1 (30 < lambda < 45)
logrs_l1_z0 = -0.162  ; rs = 0.69 Mpc/h
logb0_l1_z0 = -0.856  ; b0 = 0.14
logrs_l1_z1 = -0.230  ; rs = 0.59 Mpc/h
logb0_l1_z1 = -1.255  ; b0 = 0.056
logrs_l1_z2 = -0.778  ; rs = 0.17 Mpc/h
logb0_l1_z2 = -0.786  ; b0 = 0.16

# Lambda bin 2 (45 < lambda < 60)
logrs_l2_z0 = -0.238  ; rs = 0.58 Mpc/h
logb0_l2_z0 = -0.727  ; b0 = 0.19
logrs_l2_z1 = -0.242  ; rs = 0.57 Mpc/h
logb0_l2_z1 = -1.169  ; b0 = 0.068
logrs_l2_z2 = -0.393  ; rs = 0.41 Mpc/h
logb0_l2_z2 = -1.140  ; b0 = 0.073

# Lambda bin 3 (60 < lambda < 250)
logrs_l3_z0 = -0.195  ; rs = 0.64 Mpc/h
logb0_l3_z0 = -0.634  ; b0 = 0.23
logrs_l3_z1 = 0.067   ; rs = 1.17 Mpc/h
logb0_l3_z1 = -1.341  ; b0 = 0.046
logrs_l3_z2 = -1.0    ; weak signal - minimal boost
logb0_l3_z2 = -2.0    ; weak signal - minimal boost
