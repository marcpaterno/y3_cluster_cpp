[runtime]
; The test sampler just runs a single parameter set
sampler = test
root = ${COSMOSIS_SRC_DIR}

[DEFAULT]
# SDSS Bins
# lo_bins = 20.0 27.9 37.6 50.3 69.3 140.0
# zo_bins = 0.1 0.3
# Lighthouse Mock Bins
# lo_bins = 5.0 10.0 14.0 20.0 30.0 45.0 60.0 999.0
# zo_bins = 0.2 0.35 0.65
lo_bins = 5.0 10.0
zo_bins = 0.2 0.35
# Radius bins are in ARCMINUTES
radius_bins = 2.915 3.962 5.386 7.322 9.953 13.529 18.391 25.0 33.9839 46.1962 62.79716 85.36372 116.03972 157.73934

; If something goes wrong this will aid diagnosis
fatal_errors=T


[test]
save_dir = y3_clusters_output

[output]
filename = randomized_starts_out_08_1000.txt
format = text
verbosity = 0

[emcee]
; The emcee sampler uses the concept of walkers, a collection
; ; ; of live points.  Sampling is done along lines that connect
; ; ; pairs of walkers.  The number of walkers must be at least
; ; ; 2*nparam + 1, but in general more than that usually works
; ; ; better.
walkers = 8
samples = 1000
; ; ; This is the interval at which convergence diagnostics
; ; ; are performed
nsteps = 10
;start_points = emcee_start_points.txt
random_start = T

; The pipeline section contains information
; that describes the sequence of calculations
; to be done and what we want out at the end
[pipeline]
; The list of modules to be run, in this order.
; The modules named here must appear as sections below
modules = consistency camb halofit_takahashi sigma_r growth mf_tinker tinker_bias deltasigma cluster_abundance cluster_mass_nc_like
; The file to get cosmological and nuisance parameters
; from.
values = ${COSMOSIS_SRC_DIR}/cosmosis-standard-library/y3_cluster_cpp/cosmosis_tests/values.ini
; Not used here, becuase we are not sampling
likelihoods = like_cluster_mass_nc
extra_output = 
quiet=T
debug=F
timing=T

; The consistency module translates between our chosen parameterization
; and any other that modules in the pipeline may want (e.g. camb)
[consistency]
file = cosmosis-standard-library/utility/consistency/consistency_interface.py

[camb]
file = cosmosis-standard-library/boltzmann/camb/camb.so
mode=all
lmax=2500
feedback=0
zmin = 0.0
zmax = 0.55
nz = 100
kmin = 1e-4
kmax = 50.0
nk = 1000
matter_power_lin_version = 1

; Halofit non-linear power
[halofit_takahashi]
file = cosmosis-standard-library/boltzmann/halofit_takahashi/halofit_interface.so
nk = 182

[growth]
file = cosmosis-standard-library/structure/growth_factor/interface.so
zmin = 0.0
;the convention for this module seems to be to include the last bin
zmax = 1.0
dz = 0.1

[sigma_r]
file = cosmosis-standard-library/boltzmann/sigmar/sigmar.py
zmin = 0.0
zmax = 1.0
dz = 0.1
rmin = 1.0
rmax = 50.0
dr = 1.0
matter_power = "matter_power_lin"

[mf_tinker]
file = cosmosis-standard-library/mass_function/mf_tinker/tinker_mf_module.so
redshift_zero = 0
feedback=0
matter_power_lin_version = 1

[sigma8_rescale]
file = cosmosis-standard-library/utility/sample_sigma8/sigma8_rescale.py

[tinker_bias]
file = cosmosis-standard-library/y3_cluster_cpp/tinker_bias/tinker_bias.py

[deltasigma]
file = cosmosis-standard-library/y3_cluster_cpp/deltasigma/deltasigma.py

; distance in the sky, in Mpc/h
R_perp_min = 0.01
R_perp_max = 50
R_perp_bins = 1000

; Radii of xi_hm, in Mpc/h
Radii_min = 0.01
Radii_max = 500
Radii_bins = 1200

; cluster mass, in Msun/h
M_min = 5E11
M_max = 1E17
M_bins = 300
concentration = 5

[cluster_abundance]
file = cosmosis-standard-library/y3_cluster_cpp/src/default_cluster_abundance.so
y3_observables = ${COSMOSIS_SRC_DIR}/cosmosis-standard-library/y3_cluster_cpp/data/test_cluster_Y1.fits
verbosity = 1
profile = T

[cluster_mass_nc_like]
file = cosmosis-standard-library/cluster_mass_nc_like/likelihood.py
y3_observables = ${COSMOSIS_SRC_DIR}/cosmosis-standard-library/y3_cluster_cpp/data/test_cluster_Y1.fits
